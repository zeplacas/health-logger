<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Health Logger</title>
    <!-- PWA & iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Health">
    <meta name="theme-color" content="#0f0f23">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: -webkit-fill-available; }
        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: #0f0f23;
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            padding-top: max(30px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(16px, env(safe-area-inset-left));
            padding-right: max(16px, env(safe-area-inset-right));
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: none;
        }
        h1 { color: #00e5ff; margin-bottom: 24px; font-size: 28px; letter-spacing: 1px; }
        .form-card {
            background: rgba(20, 20, 50, 0.9);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            width: 100%; max-width: 520px;
            backdrop-filter: blur(8px);
            margin-bottom: 30px;
        }
        .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 120px; }
        label {
            font-size: 12px; color: #8899aa; margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 6px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus { border-color: #00e5ff; }
        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
        .bp-group { display: flex; align-items: center; gap: 6px; }
        .bp-group input { width: 70px; text-align: center; }
        .bp-slash { color: #00e5ff; font-size: 20px; font-weight: bold; }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.98); }
        #addBtn { background: #00e5ff; color: #0f0f23; margin-top: 6px; }
        #addBtn:hover { background: #33ecff; }
        #addBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-bar {
            width: 100%; max-width: 520px;
            text-align: center; font-size: 12px;
            color: #4a7; margin-bottom: 10px;
            min-height: 18px;
        }
        .status-bar.error { color: #f66; }
        .table-wrapper { width: 100%; max-width: 780px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th {
            background: rgba(0, 229, 255, 0.1);
            color: #00e5ff;
            padding: 10px 14px; text-align: left;
            font-weight: 600; text-transform: uppercase;
            font-size: 11px; letter-spacing: 0.8px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            white-space: nowrap;
        }
        tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }
        tbody tr:hover { background: rgba(0, 229, 255, 0.04); }
        .delete-btn {
            background: none; border: none; color: #ff4444;
            cursor: pointer; font-size: 16px; padding: 2px 8px;
            border-radius: 4px; width: auto;
        }
        .empty-msg { text-align: center; color: #556; padding: 40px; font-size: 15px; }
        .stat-bar {
            display: flex; gap: 16px; width: 100%; max-width: 780px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat {
            background: rgba(20, 20, 50, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.12);
            border-radius: 8px; padding: 12px 18px;
            flex: 1; min-width: 140px; text-align: center;
        }
        .stat .label { font-size: 11px; color: #667; text-transform: uppercase; }
        .stat .value { font-size: 20px; color: #00e5ff; font-weight: 700; margin-top: 4px; }
        #appScreen { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .actions {
            display: flex; gap: 10px;
            width: 100%; max-width: 520px;
            margin-bottom: 16px;
        }
        .actions button {
            flex: 1; padding: 10px; font-size: 13px; border-radius: 6px;
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        .actions button:hover { background: rgba(0, 229, 255, 0.25); }
        #clearBtn {
            background: rgba(255, 68, 68, 0.15) !important;
            color: #ff4444 !important;
            border: 1px solid rgba(255, 68, 68, 0.3) !important;
        }
        #clearBtn:hover { background: rgba(255, 68, 68, 0.25) !important; }
        /* Charts modal */
        .charts-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999; overflow-y: auto;
            padding: 20px 16px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        .charts-overlay.visible { display: block; }
        .charts-header {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 780px; margin: 0 auto 20px;
        }
        .charts-header h2 { color: #00e5ff; font-size: 22px; }
        .charts-close {
            background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3);
            color: #ff4444; width: auto; padding: 8px 16px;
            font-size: 14px; border-radius: 6px; cursor: pointer;
        }
        .chart-card {
            background: rgba(20, 20, 50, 0.9);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 12px; padding: 16px;
            max-width: 780px; margin: 0 auto 20px;
        }
        .chart-card h3 { color: #8899aa; font-size: 13px; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        .chart-card canvas { width: 100% !important; max-height: 260px; }
    </style>
</head>
<body>
    <!-- Main App -->
    <div id="appScreen">
        <h1>&#9829; Health Logger</h1>

        <div class="form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" id="time">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Blood Pressure (mmHg)</label>
                    <div class="bp-group">
                        <input type="number" id="systolic" placeholder="120" min="50" max="300">
                        <span class="bp-slash">/</span>
                        <input type="number" id="diastolic" placeholder="80" min="20" max="200">
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Heart Rate (bpm)</label>
                    <input type="number" id="heartRate" placeholder="72" min="20" max="300">
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70.0" min="1" max="500" step="0.1">
                </div>
            </div>
            <button id="addBtn">+ Log Entry</button>
        </div>

        <div class="status-bar" id="statusBar"></div>
        <div class="stat-bar" id="stats"></div>

        <div class="actions">
            <button id="chartsBtn">&#128200; Charts</button>
            <button id="exportBtn">&#128196; Export CSV</button>
            <button id="clearBtn">&#10005; Clear All</button>
        </div>

        <!-- Charts overlay -->
        <div class="charts-overlay" id="chartsOverlay">
            <div class="charts-header">
                <h2>&#128200; Health Charts</h2>
                <button class="charts-close" id="chartsClose">&#10005; Close</button>
            </div>
            <div class="chart-card">
                <h3>Blood Pressure (mmHg)</h3>
                <canvas id="bpChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Heart Rate (bpm)</h3>
                <canvas id="hrChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Weight (kg)</h3>
                <canvas id="wtChart"></canvas>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Blood Pressure</th>
                        <th>Heart Rate</th>
                        <th>Weight</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
            <div class="empty-msg" id="emptyMsg">No entries yet. Log your first reading above.</div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const STORAGE_KEY = 'health_entries';
        let entries = [];

        // ========================================================
        // DOM references
        // ========================================================
        const $ = (id) => document.getElementById(id);
        const statusBar = $('statusBar');

        // ========================================================
        // Initialization
        // ========================================================
        function init() {
            entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            setDefaults();
            renderTable();
            showStatus(entries.length ? entries.length + ' entries loaded' : '');

            $('addBtn').addEventListener('click', addEntry);
            $('chartsBtn').addEventListener('click', showCharts);
            $('chartsClose').addEventListener('click', hideCharts);
            $('exportBtn').addEventListener('click', exportCSV);
            $('clearBtn').addEventListener('click', clearAll);
            $('logBody').addEventListener('click', handleDeleteClick);
        }

        function setDefaults() {
            const now = new Date();
            $('date').value = now.toISOString().slice(0, 10);
            $('time').value = now.toTimeString().slice(0, 5);
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }

        // ========================================================
        // Add Entry
        // ========================================================
        function addEntry() {
            const date = $('date').value;
            const time = $('time').value;
            const systolic = parseInt($('systolic').value);
            const diastolic = parseInt($('diastolic').value);
            const heartRate = parseInt($('heartRate').value);
            const weight = parseFloat($('weight').value);

            if (!date || !time || isNaN(systolic) || isNaN(diastolic) || isNaN(heartRate) || isNaN(weight)) {
                showStatus('Please fill in all fields.', 'error');
                return;
            }

            entries.push({ date, time, systolic, diastolic, heartRate, weight });
            save();
            renderTable();

            $('systolic').value = '';
            $('diastolic').value = '';
            $('heartRate').value = '';
            $('weight').value = '';
            setDefaults();

            showStatus('Entry saved');
        }

        // ========================================================
        // Delete Entry
        // ========================================================
        function handleDeleteClick(e) {
            const btn = e.target.closest('.delete-btn');
            if (!btn) return;
            const idx = parseInt(btn.dataset.idx);
            if (isNaN(idx)) return;

            entries.splice(idx, 1);
            save();
            renderTable();
            showStatus('Entry deleted');
        }

        // ========================================================
        // Clear All
        // ========================================================
        function clearAll() {
            if (!entries.length) return;
            if (!confirm('Delete all entries? This cannot be undone.')) return;
            entries = [];
            save();
            renderTable();
            showStatus('All entries cleared');
        }

        // ========================================================
        // Export CSV
        // ========================================================
        function exportCSV() {
            if (!entries.length) { showStatus('Nothing to export', 'error'); return; }

            const sorted = [...entries].sort((a, b) =>
                new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)
            );
            const header = 'Date,Time,Systolic,Diastolic,Heart Rate,Weight';
            const rows = sorted.map(e =>
                [e.date, e.time, e.systolic, e.diastolic, e.heartRate, e.weight].join(',')
            );
            const csv = header + '\n' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'HealthData_' + new Date().toISOString().slice(0, 10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);

            showStatus('CSV exported — ' + entries.length + ' entries');
        }

        // ========================================================
        // Rendering
        // ========================================================
        function renderTable() {
            const tbody = $('logBody');
            const emptyMsg = $('emptyMsg');

            tbody.innerHTML = '';
            emptyMsg.style.display = entries.length ? 'none' : 'block';

            const sorted = [...entries]
                .map((e, i) => ({ ...e, _idx: i }))
                .sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));

            sorted.forEach(entry => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + formatDate(entry.date) + '</td>' +
                    '<td>' + escapeHtml(entry.time) + '</td>' +
                    '<td>' + entry.systolic + '/' + entry.diastolic + '</td>' +
                    '<td>' + entry.heartRate + ' bpm</td>' +
                    '<td>' + entry.weight + ' kg</td>' +
                    '<td><button class="delete-btn" data-idx="' + entry._idx + '" title="Delete">&#10005;</button></td>';
                tbody.appendChild(tr);
            });

            renderStats();
        }

        function renderStats() {
            const statsEl = $('stats');
            if (!entries.length) { statsEl.innerHTML = ''; return; }

            const avg = (arr) => (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);
            const sorted = [...entries].sort((a, b) =>
                new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time)
            );
            const latest = sorted[0];

            statsEl.innerHTML =
                '<div class="stat"><div class="label">Latest BP</div><div class="value">' + latest.systolic + '/' + latest.diastolic + '</div></div>' +
                '<div class="stat"><div class="label">Avg Heart Rate</div><div class="value">' + avg(entries.map(e => e.heartRate)) + ' bpm</div></div>' +
                '<div class="stat"><div class="label">Avg Weight</div><div class="value">' + avg(entries.map(e => e.weight)) + ' kg</div></div>' +
                '<div class="stat"><div class="label">Total Entries</div><div class="value">' + entries.length + '</div></div>';
        }

        // ========================================================
        // Charts
        // ========================================================
        let bpChart, hrChart, wtChart;

        function showCharts() {
            if (!entries.length) { showStatus('No data to chart', 'error'); return; }
            $('chartsOverlay').classList.add('visible');
            renderCharts();
        }

        function hideCharts() {
            $('chartsOverlay').classList.remove('visible');
        }

        function renderCharts() {
            const sorted = [...entries].sort((a, b) =>
                new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)
            );
            const labels = sorted.map(e => e.date);

            const chartOpts = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#aab' } } },
                scales: {
                    x: { ticks: { color: '#667', maxRotation: 45 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#667' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            };

            // Blood Pressure
            if (bpChart) bpChart.destroy();
            bpChart = new Chart($('bpChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Systolic', data: sorted.map(e => e.systolic), borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', tension: 0.3, pointRadius: 3 },
                        { label: 'Diastolic', data: sorted.map(e => e.diastolic), borderColor: '#48dbfb', backgroundColor: 'rgba(72,219,251,0.1)', tension: 0.3, pointRadius: 3 }
                    ]
                },
                options: chartOpts
            });

            // Heart Rate
            if (hrChart) hrChart.destroy();
            hrChart = new Chart($('hrChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Heart Rate', data: sorted.map(e => e.heartRate), borderColor: '#ff9f43', backgroundColor: 'rgba(255,159,67,0.1)', tension: 0.3, pointRadius: 3 }
                    ]
                },
                options: chartOpts
            });

            // Weight
            if (wtChart) wtChart.destroy();
            wtChart = new Chart($('wtChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Weight', data: sorted.map(e => e.weight), borderColor: '#2ed573', backgroundColor: 'rgba(46,213,115,0.1)', tension: 0.3, pointRadius: 3 }
                    ]
                },
                options: chartOpts
            });
        }

        // ========================================================
        // Utilities
        // ========================================================
        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showStatus(msg, type) {
            statusBar.textContent = msg;
            statusBar.className = 'status-bar' + (type ? ' ' + type : '');
        }

        // ========================================================
        // PWA / iOS support
        // ========================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        if (isIOS && !isStandalone) {
            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a3a;color:#aab;text-align:center;padding:14px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));font-size:13px;z-index:10000;border-top:1px solid rgba(0,229,255,0.2)';
            banner.innerHTML = 'Install this app: tap <b style="color:#00e5ff">Share</b> &#11014; then <b style="color:#00e5ff">Add to Home Screen</b> <span id="dismissInstall" style="margin-left:12px;cursor:pointer;color:#ff4444">&#10005;</span>';
            document.body.appendChild(banner);
            document.getElementById('dismissInstall').onclick = () => banner.remove();
        }

        // ========================================================
        // Start
        // ========================================================
        init();
    })();
    </script>
</body>
</html>
