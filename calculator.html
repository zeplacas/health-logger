<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
        }
        .calculator {
            background: #16213e; border-radius: 16px; padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 320px;
        }
        .display {
            background: #0f3460; border-radius: 12px; padding: 20px;
            margin-bottom: 20px; text-align: right; min-height: 90px;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .display .expression {
            color: #8899aa; font-size: 16px; min-height: 22px;
            word-break: break-all;
        }
        .display .result {
            color: #e0e0e0; font-size: 36px; font-weight: 600;
            word-break: break-all;
        }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button {
            padding: 18px; font-size: 20px; border: none; border-radius: 10px;
            cursor: pointer; transition: background 0.15s, transform 0.1s;
            font-weight: 500;
        }
        button:active { transform: scale(0.95); }
        .btn-num { background: #1a1a40; color: #e0e0e0; }
        .btn-num:hover { background: #2a2a50; }
        .btn-op { background: #e94560; color: #fff; }
        .btn-op:hover { background: #ff6b81; }
        .btn-func { background: #533483; color: #fff; }
        .btn-func:hover { background: #6a45a0; }
        .btn-eq { background: #0f9b58; color: #fff; grid-column: span 2; }
        .btn-eq:hover { background: #12b866; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn-func" data-action="clear">AC</button>
            <button class="btn-func" data-action="backspace">&larr;</button>
            <button class="btn-func" data-action="percent">%</button>
            <button class="btn-op" data-action="op" data-value="/">&divide;</button>

            <button class="btn-num" data-value="7">7</button>
            <button class="btn-num" data-value="8">8</button>
            <button class="btn-num" data-value="9">9</button>
            <button class="btn-op" data-action="op" data-value="*">&times;</button>

            <button class="btn-num" data-value="4">4</button>
            <button class="btn-num" data-value="5">5</button>
            <button class="btn-num" data-value="6">6</button>
            <button class="btn-op" data-action="op" data-value="-">&minus;</button>

            <button class="btn-num" data-value="1">1</button>
            <button class="btn-num" data-value="2">2</button>
            <button class="btn-num" data-value="3">3</button>
            <button class="btn-op" data-action="op" data-value="+">+</button>

            <button class="btn-num" data-value="0">0</button>
            <button class="btn-num" data-action="decimal">.</button>
            <button class="btn-eq" data-action="equals">=</button>
        </div>
    </div>

    <script>
        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');

        let current = '0';
        let previous = '';
        let operator = '';
        let shouldReset = false;

        function updateDisplay() {
            resultEl.textContent = current;
            expressionEl.textContent = previous + (operator ? ' ' + formatOp(operator) : '');
        }

        function formatOp(op) {
            return { '/': '\u00F7', '*': '\u00D7', '-': '\u2212', '+': '+' }[op] || op;
        }

        function inputDigit(digit) {
            if (shouldReset) { current = ''; shouldReset = false; }
            if (current === '0' && digit !== '.') current = '';
            if (current.length >= 15) return;
            current += digit;
            updateDisplay();
        }

        function inputDecimal() {
            if (shouldReset) { current = '0'; shouldReset = false; }
            if (!current.includes('.')) current += '.';
            updateDisplay();
        }

        function handleOperator(op) {
            if (operator && !shouldReset) calculate();
            previous = current;
            operator = op;
            shouldReset = true;
            updateDisplay();
        }

        function calculate() {
            if (!operator || shouldReset) return;
            const a = parseFloat(previous);
            const b = parseFloat(current);
            let result;
            switch (operator) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': result = b === 0 ? 'Error' : a / b; break;
            }
            expressionEl.textContent = previous + ' ' + formatOp(operator) + ' ' + current + ' =';
            current = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));
            resultEl.textContent = current;
            operator = '';
            previous = '';
            shouldReset = true;
        }

        function clear() {
            current = '0'; previous = ''; operator = ''; shouldReset = false;
            updateDisplay();
        }

        function backspace() {
            if (shouldReset) return;
            current = current.length > 1 ? current.slice(0, -1) : '0';
            updateDisplay();
        }

        function percent() {
            current = String(parseFloat(current) / 100);
            updateDisplay();
        }

        document.querySelector('.buttons').addEventListener('click', e => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const action = btn.dataset.action;
            const value = btn.dataset.value;

            if (!action) { inputDigit(value); return; }
            switch (action) {
                case 'clear': clear(); break;
                case 'backspace': backspace(); break;
                case 'percent': percent(); break;
                case 'decimal': inputDecimal(); break;
                case 'op': handleOperator(value); break;
                case 'equals': calculate(); break;
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
            else if (e.key === '.') inputDecimal();
            else if (['+', '-', '*', '/'].includes(e.key)) handleOperator(e.key);
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clear();
            else if (e.key === '%') percent();
        });
    </script>
</body>
</html>
