<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Coordinates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; background: #0f0f23; cursor: none;
            font-family: 'Segoe UI', monospace; overflow: hidden;
        }
        #coords {
            position: fixed; pointer-events: none;
            background: rgba(15, 15, 35, 0.85);
            color: #00e5ff; font-size: 14px; font-weight: 600;
            padding: 6px 12px; border-radius: 8px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            backdrop-filter: blur(8px);
            white-space: nowrap; display: none; z-index: 9999;
        }
        #crosshair {
            position: fixed; pointer-events: none; z-index: 9998;
            width: 64px; height: 64px;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
</head>
<body>
    <div id="coords"></div>
    <!-- WW2 plane crosshair SVG -->
    <svg id="crosshair" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer ring -->
        <circle cx="32" cy="32" r="28" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.7"/>
        <!-- Inner ring -->
        <circle cx="32" cy="32" r="14" fill="none" stroke="#ff4400" stroke-width="1.2" opacity="0.8"/>
        <!-- Center dot -->
        <circle cx="32" cy="32" r="2" fill="#ff4400"/>
        <!-- Top vertical line -->
        <line x1="32" y1="2" x2="32" y2="18" stroke="#ff4400" stroke-width="1.5" opacity="0.8"/>
        <!-- Bottom vertical line -->
        <line x1="32" y1="46" x2="32" y2="62" stroke="#ff4400" stroke-width="1.5" opacity="0.8"/>
        <!-- Left horizontal line -->
        <line x1="2" y1="32" x2="18" y2="32" stroke="#ff4400" stroke-width="1.5" opacity="0.8"/>
        <!-- Right horizontal line -->
        <line x1="46" y1="32" x2="62" y2="32" stroke="#ff4400" stroke-width="1.5" opacity="0.8"/>
        <!-- Range estimation marks (horizontal tick marks) -->
        <line x1="28" y1="20" x2="36" y2="20" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
        <line x1="28" y1="44" x2="36" y2="44" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
        <line x1="20" y1="28" x2="20" y2="36" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
        <line x1="44" y1="28" x2="44" y2="36" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
        <!-- Diagonal range lines (stadiametric) -->
        <line x1="8" y1="8" x2="14" y2="14" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
        <line x1="56" y1="8" x2="50" y2="14" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
        <line x1="8" y1="56" x2="14" y2="50" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
        <line x1="56" y1="56" x2="50" y2="50" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
    </svg>
    <script>
        const label = document.getElementById('coords');
        const crosshair = document.getElementById('crosshair');
        const offset = 18;

        document.addEventListener('mousemove', e => {
            label.style.display = 'block';
            crosshair.style.display = 'block';
            label.textContent = `X: ${e.clientX}  Y: ${e.clientY}`;

            crosshair.style.left = e.clientX + 'px';
            crosshair.style.top = e.clientY + 'px';

            let x = e.clientX + offset;
            let y = e.clientY + offset;

            const rect = label.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - offset;
            if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - offset;

            label.style.left = x + 'px';
            label.style.top = y + 'px';
        });

        document.addEventListener('mouseleave', () => {
            label.style.display = 'none';
            crosshair.style.display = 'none';
        });
    </script>
</body>
</html>
